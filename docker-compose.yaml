version: "3.9"

services:

  mariadb:
    image: mariadb:10.11
    container_name: parsing_mariadb
    ports:
      - "3306:3306"
    environment:
      MARIADB_ROOT_PASSWORD: rootpassword
      MARIADB_DATABASE: labdb
      MARIADB_USER: labuser
      MARIADB_PASSWORD: labpassword
    volumes:
      - ./mariadb_data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mariadb", "-u", "labuser", "-plabpassword", "-e", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  ollama:
    image: ollama/ollama:latest
    container_name: parsing_ollama
    ports:
      - "11434:11434"
    volumes:
      - ./ollama_data:/root/.ollama
    restart: unless-stopped
    entrypoint: >
      sh -c "ollama serve &
             sleep 10 &&
             ollama pull llama3.2:3b &&
             wait"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: parsing_backend
    ports:
      - "8003:8003"
    volumes:
      - ./gs_data:/app/gs_data:ro
      - ./domains.json:/app/domains.json:ro
    environment:
      - PYTHONUNBUFFERED=1
      - DB_HOST=mariadb
      - DB_PORT=3306
      - DB_USER=labuser
      - DB_PASSWORD=labpassword
      - DB_NAME=labdb
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3.2:3b
      - GS_DATA_DIR=/app/gs_data
    depends_on:
      mariadb:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: parsing_frontend
    ports:
      - "8004:8004"
    environment:
      - BACKEND_URL=http://backend:8003
      - PYTHONUNBUFFERED=1
    depends_on:
      - backend
    restart: unless-stopped
